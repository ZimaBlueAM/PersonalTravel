<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f7f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="JR路线大纲" />
    <title>北海道到东京｜JR路线大纲</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%231f4b3f"/><path d="M18 18h28M18 32h28M18 46h28" stroke="white" stroke-width="6" stroke-linecap="round"/></svg>' />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#outline">跳到路线大纲</a>

    <svg class="icons" aria-hidden="true" focusable="false">
      <symbol id="i-close" viewBox="0 0 24 24">
        <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-minus" viewBox="0 0 24 24">
        <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-route" viewBox="0 0 24 24">
        <path d="M6 19a3 3 0 1 1 0-6 3 3 0 0 1 0 6ZM18 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M8.4 14.7c3-1.2 5.2-2.8 6.8-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-train" viewBox="0 0 24 24">
        <path d="M7 3h10a3 3 0 0 1 3 3v8a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V6a3 3 0 0 1 3-3Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M8 21l2-3M16 18l2 3M8 8h8M8 13h.01M16 13h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-bus" viewBox="0 0 24 24">
        <path d="M6 4h12a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M3 10h18M7 18v2M17 18v2M7.5 14h.01M16.5 14h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-clock" viewBox="0 0 24 24">
        <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-alert" viewBox="0 0 24 24">
        <path d="m12 3 10 18H2L12 3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M12 9v5M12 18h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-info" viewBox="0 0 24 24">
        <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M12 11v5M12 8h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-link" viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.2 1.2M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.2-1.2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-list" viewBox="0 0 24 24">
        <path d="M8 6h13M8 12h13M8 18h13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="i-search" viewBox="0 0 24 24">
        <path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.3-4.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
    </svg>

    <main class="page">
      <header class="topbar">
        <p>北海道 → 本州 → 东京</p>
        <h1>6 基地路线</h1>
        <span>2026-07-05 交通审计版</span>
      </header>

      <section class="outline-board" id="outline" aria-labelledby="outline-title">
        <div class="section-heading outline-heading">
          <span class="heading-icon" aria-hidden="true"><svg><use href="#i-list"></use></svg></span>
          <div>
            <h2 id="outline-title">路线大纲</h2>
            <p>基地 / 城市 / 可选子目的地</p>
          </div>
        </div>
        <div class="outline-tree" id="outlineTree"></div>
      </section>

      <section class="transport-board" aria-labelledby="transport-title">
        <div class="section-heading">
          <span class="heading-icon" aria-hidden="true"><svg><use href="#i-route"></use></svg></span>
          <div>
            <h2 id="transport-title">基地间公交</h2>
            <p>铁路 / 巴士 / 换乘链路</p>
          </div>
        </div>
        <div class="transfer-list" id="transferList"></div>
      </section>

      <section class="optimization-board" aria-labelledby="optimization-title">
        <div class="section-heading">
          <span class="heading-icon is-quiet" aria-hidden="true"><svg><use href="#i-check"></use></svg></span>
          <div>
            <h2 id="optimization-title">取舍建议</h2>
            <p>只保留会影响体力和绕路的判断</p>
          </div>
        </div>
        <div class="optimization-list" id="optimizationList"></div>
      </section>
    </main>

    <div class="detail-modal" id="detailModal" hidden>
      <div class="modal-backdrop" data-close-modal aria-hidden="true"></div>
      <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
        <button class="modal-close" type="button" data-close-modal aria-label="关闭详情">
          <svg aria-hidden="true"><use href="#i-close"></use></svg>
        </button>
        <img class="modal-image" id="modalImage" alt="" width="1200" height="800" />
        <div class="modal-body">
          <p class="modal-kind" id="modalKind"></p>
          <h2 id="modalTitle"></h2>
          <p class="modal-summary" id="modalSummary"></p>
          <div class="modal-facts" id="modalFacts"></div>
          <div class="modal-tags" id="modalTags"></div>
          <div class="modal-sections" id="modalSections"></div>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
