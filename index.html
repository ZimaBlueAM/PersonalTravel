<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="旅行大纲" />
    <meta name="application-name" content="旅行大纲" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="可在 iPhone 上浏览的旅行规划合集，支持方案切换、分层路线、交通核验和离线缓存。"
    />
    <title>旅行规划合集｜可执行路线大纲</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" type="image/svg+xml" href="assets/pwa/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/pwa/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/pwa/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#planning">跳到规划合集</a>

    <svg class="icons" aria-hidden="true" focusable="false">
      <symbol id="i-close" viewBox="0 0 24 24">
        <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-minus" viewBox="0 0 24 24">
        <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-route" viewBox="0 0 24 24">
        <path d="M6 19a3 3 0 1 1 0-6 3 3 0 0 1 0 6ZM18 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M8.4 14.7c3-1.2 5.2-2.8 6.8-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-plane" viewBox="0 0 24 24">
        <path d="M21 16 3 21l4-7-4-7 18 5v4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M7 14h7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-train" viewBox="0 0 24 24">
        <path d="M7 3h10a3 3 0 0 1 3 3v8a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V6a3 3 0 0 1 3-3Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M8 21l2-3M16 18l2 3M8 8h8M8 13h.01M16 13h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-bus" viewBox="0 0 24 24">
        <path d="M6 4h12a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M3 10h18M7 18v2M17 18v2M7.5 14h.01M16.5 14h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-clock" viewBox="0 0 24 24">
        <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-alert" viewBox="0 0 24 24">
        <path d="m12 3 10 18H2L12 3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M12 9v5M12 18h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-info" viewBox="0 0 24 24">
        <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M12 11v5M12 8h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-link" viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.2 1.2M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.2-1.2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-list" viewBox="0 0 24 24">
        <path d="M8 6h13M8 12h13M8 18h13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="i-star" viewBox="0 0 24 24">
        <path d="m12 4 2.8 5.7 6.3.9-4.6 4.4 1.1 6.3L12 18l-5.6 3 1.1-6.3-4.6-4.4 6.3-.9L12 4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
      </symbol>
      <symbol id="i-search" viewBox="0 0 24 24">
        <path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.3-4.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-compass" viewBox="0 0 24 24">
        <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="m15.5 8.5-2 5-5 2 2-5 5-2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
      </symbol>
      <symbol id="i-home" viewBox="0 0 24 24">
        <path d="m3 11 9-8 9 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M5 10v10h14V10M9 20v-6h6v6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
      </symbol>
      <symbol id="i-city" viewBox="0 0 24 24">
        <path d="M4 21V7h6v14M14 21V3h6v18M2 21h20M7 10h.01M7 14h.01M7 18h.01M17 6h.01M17 10h.01M17 14h.01M17 18h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-pin" viewBox="0 0 24 24">
        <path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M12 10.5h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
      </symbol>
      <symbol id="i-hub" viewBox="0 0 24 24">
        <path d="M12 4v16M4 12h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2" />
      </symbol>
      <symbol id="i-cup" viewBox="0 0 24 24">
        <path d="M5 8h11v5a5 5 0 0 1-5 5H10a5 5 0 0 1-5-5V8Z" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M16 10h1a3 3 0 0 1 0 6h-1M6 21h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path d="M8 4v1M12 3v2M16 4v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-suitcase" viewBox="0 0 24 24">
        <path d="M8 7V6a4 4 0 0 1 8 0v1M7 7h10a3 3 0 0 1 3 3v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a3 3 0 0 1 3-3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M10 11v6M14 11v6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-calendar" viewBox="0 0 24 24">
        <path d="M6 3v3M18 3v3M4 9h16M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M8 13h3M8 17h3M14 13h2M14 17h2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="i-thermometer" viewBox="0 0 24 24">
        <path d="M10 14.8V5a3 3 0 0 1 6 0v9.8a5 5 0 1 1-6 0Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M13 8v8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
    </svg>

    <main class="page">
      <header class="topbar">
        <p>Japan / 2 个旅行主题</p>
        <h1>两条路线大纲</h1>
        <span>先选主题，再看内部目的地</span>
      </header>

      <section class="planning-board" id="planning" aria-labelledby="planning-title">
        <div class="section-heading">
          <span class="heading-icon" aria-hidden="true"><svg><use href="#i-calendar"></use></svg></span>
          <div>
            <h2 id="planning-title">选择旅行主题</h2>
            <p>北海道到东京 / 东京进出</p>
          </div>
        </div>
        <div class="plan-tabs" id="planTabs" role="tablist" aria-label="旅行规划选择"></div>
        <div class="plan-panel" id="planPanel" role="tabpanel" tabindex="0"></div>
      </section>

      <section class="outline-board" id="outline" aria-labelledby="outline-title">
        <div class="section-heading outline-heading">
          <span class="heading-icon" aria-hidden="true"><svg><use href="#i-list"></use></svg></span>
          <div>
            <h2 id="outline-title">路线大纲</h2>
            <p>必去主线 / 可选支线</p>
          </div>
        </div>
        <div class="focus-strip" aria-label="按偏好筛选路线">
          <button class="filter-button is-active" type="button" data-filter="all" aria-pressed="true"><svg aria-hidden="true"><use href="#i-list"></use></svg><span>全部</span></button>
          <button class="filter-button" type="button" data-filter="recommended" aria-pressed="false"><svg aria-hidden="true"><use href="#i-star"></use></svg><span>推荐</span></button>
          <button class="filter-button" type="button" data-filter="relaxed" aria-pressed="false"><svg aria-hidden="true"><use href="#i-clock"></use></svg><span>松弛</span></button>
          <button class="filter-button" type="button" data-filter="edge" aria-pressed="false"><svg aria-hidden="true"><use href="#i-compass"></use></svg><span>边缘</span></button>
          <button class="filter-button" type="button" data-filter="food" aria-pressed="false"><svg aria-hidden="true"><use href="#i-cup"></use></svg><span>探店</span></button>
          <button class="filter-button" type="button" data-filter="transport" aria-pressed="false"><svg aria-hidden="true"><use href="#i-train"></use></svg><span>交通</span></button>
        </div>
        <div class="outline-tree" id="outlineTree"></div>
      </section>

      <section class="route-map-board" aria-labelledby="route-map-title">
        <div class="section-heading">
          <span class="heading-icon is-quiet" aria-hidden="true"><svg><use href="#i-compass"></use></svg></span>
          <div>
            <h2 id="route-map-title">路线地图概览</h2>
            <p>先看地理，再判断是否绕路</p>
          </div>
        </div>
        <div class="route-map-overview" id="routeMapOverview"></div>
      </section>

      <section class="transport-board" aria-labelledby="transport-title">
        <div class="section-heading">
          <span class="heading-icon" aria-hidden="true"><svg><use href="#i-route"></use></svg></span>
          <div>
            <h2 id="transport-title">基地间公共交通</h2>
            <p>必去点之间的可执行交通</p>
          </div>
        </div>
        <div class="transport-audit" id="transportAudit"></div>
        <div class="transfer-list" id="transferList"></div>
      </section>

      <section class="bus-board" aria-labelledby="bus-title">
        <div class="section-heading">
          <span class="heading-icon is-quiet" aria-hidden="true"><svg><use href="#i-bus"></use></svg></span>
          <div>
            <h2 id="bus-title">可选支线接驳</h2>
            <p>非必去点才看这里，主线不用背这些</p>
          </div>
        </div>
        <div class="transfer-list" id="busTransferList"></div>
      </section>

      <section class="comfort-board" aria-labelledby="comfort-title">
        <div class="section-heading">
          <span class="heading-icon is-quiet" aria-hidden="true"><svg><use href="#i-clock"></use></svg></span>
          <div>
            <h2 id="comfort-title">长交通减负</h2>
            <p>JR / 公交太久时，优先怎么改</p>
          </div>
        </div>
        <div class="optimization-list" id="comfortList"></div>
      </section>

      <section class="adult-board" aria-labelledby="adult-title">
        <div class="section-heading">
          <span class="heading-icon" aria-hidden="true"><svg><use href="#i-compass"></use></svg></span>
          <div>
            <h2 id="adult-title">32岁玩法</h2>
            <p>更像人会做的选择：少搬家、少硬塞、先把回程和睡眠定住</p>
          </div>
        </div>
        <div class="adult-list" id="adultPlaybook"></div>
        <div class="adult-divider" aria-hidden="true">我自己会这样排</div>
        <div class="adult-list" id="adultRoutePlan"></div>
      </section>

      <section class="optimization-board" aria-labelledby="optimization-title">
        <div class="section-heading">
          <span class="heading-icon is-quiet" aria-hidden="true"><svg><use href="#i-check"></use></svg></span>
          <div>
            <h2 id="optimization-title">取舍建议</h2>
            <p>只保留会影响体力和绕路的判断</p>
          </div>
        </div>
        <div class="optimization-list" id="optimizationList"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="页面导航">
      <a href="#planning" class="bottom-nav-item">
        <svg aria-hidden="true"><use href="#i-calendar"></use></svg>
        <span>规划</span>
      </a>
      <a href="#outline" class="bottom-nav-item">
        <svg aria-hidden="true"><use href="#i-list"></use></svg>
        <span>大纲</span>
      </a>
      <a href="#route-map-title" class="bottom-nav-item">
        <svg aria-hidden="true"><use href="#i-pin"></use></svg>
        <span>地图</span>
      </a>
      <a href="#transport-title" class="bottom-nav-item">
        <svg aria-hidden="true"><use href="#i-route"></use></svg>
        <span>交通</span>
      </a>
      <a href="#optimization-title" class="bottom-nav-item">
        <svg aria-hidden="true"><use href="#i-check"></use></svg>
        <span>取舍</span>
      </a>
    </nav>

    <div class="detail-modal" id="detailModal" hidden>
      <div class="modal-backdrop" data-close-modal aria-hidden="true"></div>
      <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
        <button class="modal-close" type="button" data-close-modal aria-label="关闭详情">
          <svg aria-hidden="true"><use href="#i-close"></use></svg>
        </button>
        <img class="modal-image" id="modalImage" alt="" width="1200" height="800" />
        <div class="modal-body">
          <p class="modal-kind" id="modalKind"></p>
          <h2 id="modalTitle"></h2>
          <p class="modal-summary" id="modalSummary"></p>
          <div class="modal-facts" id="modalFacts"></div>
          <div class="modal-tags" id="modalTags"></div>
          <div class="modal-sections" id="modalSections"></div>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
        navigator.serviceWorker
          .register("./sw.js", { updateViaCache: "none" })
          .then((registration) => registration.update())
          .catch(() => {});
      }
    </script>
    <script src="app.js"></script>
  </body>
</html>
